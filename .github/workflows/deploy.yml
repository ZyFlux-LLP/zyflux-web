name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy to Hostinger via FTP
        run: |
          lftp -u "${{ secrets.HOSTINGER_FTP_USER }}","${{ secrets.HOSTINGER_FTP_PASS }}" \
            -e "set ftp:ssl-allow true; set ftp:ssl-force false; set ssl:verify-certificate false; set ftp:passive-mode true; mirror -R --delete ./out/ /public_html/; quit" \
            147.93.17.193
